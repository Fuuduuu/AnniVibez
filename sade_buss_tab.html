.stop-name{font-size:17px;font-weight:500}
.stop-sub{font-size:12px;color:var(--color-text-tertiary);margin-top:3px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pill{border:0.5px solid var(--color-border-secondary);border-radius:20px;padding:5px 13px;font-size:13px;cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all .15s}
.pill.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
.dep-row{display:flex;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.dep-row:last-child{border-bottom:none}
.dep-time{font-size:22px;font-weight:500;font-variant-numeric:tabular-nums;min-width:62px}
.dep-badge{background:#E1F5EE;color:#0F6E56;font-size:11px;font-weight:500;border-radius:4px;padding:2px 8px;margin-right:10px;white-space:nowrap;flex-shrink:0}
.dep-dir{font-size:13px;color:var(--color-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note{font-size:11px;color:var(--color-text-tertiary);margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary)}
select{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;margin-top:10px}
.btn-gps{display:flex;align-items:center;gap:8px;padding:10px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);cursor:pointer;font-size:13px;color:var(--color-text-secondary);width:100%;transition:background .15s}
.btn-gps:hover{background:var(--color-background-primary);border-color:var(--color-border-primary)}
.dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0;transition:background .2s}
.dot.s{background:#EF9F27;animation:p 1s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.empty{color:var(--color-text-tertiary);font-size:13px;padding:14px 0;text-align:center}
</style>
<div class="wrap">
<p class="slabel">Asukoht</p>
<button class="btn-gps" onclick="getGPS()">
  <span class="dot" id="dot"></span>
  <span id="gpslbl">Leia lähim peatus GPS-iga</span>
</button>
<div class="pills" id="pills"></div>
<p class="slabel">Peatus</p>
<div class="card">
  <div class="stop-name" id="sname">Vali peatus</div>
  <div class="stop-sub" id="ssub">GPS või valik allpool</div>
  <select id="ssel" onchange="onSel(this.value)"><option value="">— vali käsitsi —</option></select>
</div>
<p class="slabel">Järgmised bussid</p>
<div class="card">
  <div class="empty" id="empty">Vali peatus, et näha väljumisi</div>
  <div id="deps"></div>
  <div class="note" id="note" style="display:none">Ajad plaani järgi — reaalajas jälgimist ei ole</div>
</div>
</div>
<script>
const D=JSON.parse(document.getElementById('dataEl').textContent);
const SAV=JSON.parse(document.getElementById('savedEl').textContent);
const groups=D.groups,lines=D.lines;
let cur=[];
function wd(){const d=new Date().getDay();return d===0?'P':d===6?'L':'E-R';}
function hav(a,b,c,e){const R=6371000,p=Math.PI/180,f=Math.sin((c-a)*p/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin((e-b)*p/2)**2;return 2*R*Math.asin(Math.sqrt(f));}
function nearest(lat,lon){let b=null,bd=Infinity;for(const g of groups){const d=hav(lat,lon,g.lat,g.lon);if(d<bd){bd=d;b=g;}}return{...b,dist:Math.round(bd)};}
function deps(codes,svc,now,lim=3){
  const res=[];
  for(const ln of lines){
    if(ln.service!==svc)continue;
    for(const s of ln.stops){
      if(!codes.includes(s.code))continue;
      for(const t of ln.trips)for(const st of t.stop_times)if(st.seq===s.seq&&st.time>=now)res.push({line:ln.line,v:ln.variant||'',dir:ln.direction,time:st.time});
      break;
    }
  }
  res.sort((a,b)=>a.time.localeCompare(b.time));
  const seen=new Set(),out=[];
  for(const r of res){const k=r.line+r.v+r.time;if(!seen.has(k)){seen.add(k);out.push(r);}if(out.length>=lim)break;}
  return out;
}
function setStop(g){
  cur=g.codes;
  document.getElementById('sname').textContent=g.name;
  document.getElementById('ssub').textContent=g.dist!=null?'Lähim · '+g.dist+' m':'Valitud käsitsi';
  document.getElementById('ssel').value='';
  render();
}
function render(){
  if(!cur.length)return;
  const now=new Date(),ns=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const d=deps(cur,wd(),ns,3);
  const el=document.getElementById('deps'),em=document.getElementById('empty'),nt=document.getElementById('note');
  if(!d.length){em.textContent='Täna enam busse pole';em.style.display='';el.innerHTML='';nt.style.display='none';return;}
  em.style.display='none';nt.style.display='';
  el.innerHTML=d.map(r=>'<div class="dep-row"><span class="dep-time">'+r.time+'</span><span class="dep-badge">Liin '+r.line+(r.v?'·'+r.v:'')+'</span><span class="dep-dir">'+r.dir+'</span></div>').join('');
}
function getGPS(){
  const dot=document.getElementById('dot'),lbl=document.getElementById('gpslbl');
  dot.className='dot s';lbl.textContent='Otsib asukohta…';
  if(!navigator.geolocation){lbl.textContent='GPS ei ole saadaval';dot.className='dot';return;}
  navigator.geolocation.getCurrentPosition(p=>{
    const g=nearest(p.coords.latitude,p.coords.longitude);
    dot.className='dot';lbl.textContent='GPS: '+g.name+' ('+g.dist+' m)';
    setStop(g);hiPill(null);
  },()=>{dot.className='dot';lbl.textContent='GPS luba puudub — vali käsitsi';},{timeout:8000,enableHighAccuracy:true});
}
function onSel(n){if(!n)return;const g=groups.find(g=>g.name===n);if(g)setStop({...g,dist:null});hiPill(null);}
function hiPill(n){document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.n===n));}
document.getElementById('pills').innerHTML=SAV.map(s=>'<button class="pill" data-n="'+s.name+'" onclick="onPill(this,'+s.lat+','+s.lon+')">'+s.name+'</button>').join('');
document.getElementById('ssel').innerHTML='<option value="">— vali käsitsi —</option>'+groups.map(g=>'<option value="'+g.name+'">'+g.name+'</option>').join('');
function onPill(el,lat,lon){const g=nearest(lat,lon);setStop({...g,dist:Math.round(hav(lat,lon,g.lat,g.lon))});hiPill(el.dataset.n);}
</script>
